<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra Sneaker Store</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">SneakerStore</div>

<nav>

<a href="#" onclick="renderProducts(products)">Home</a>
<a href="#" onclick="filterCampus()">Campus</a>
<a href="#" onclick="filterAsian()">Asian</a>
<a href="#" onclick="filterRedtape()">RedTape</a>

</nav>

</header>

<section class="hero">

<h1>Premium Sneakers</h1>
<p>Minimal • Aesthetic • Powerful</p>

</section>

<section class="card-grid">

<div class="card" onclick="filterPrice()">
<h3>Under ₹1000</h3>
</div>

<div class="card" onclick="filterCampus()">
<h3>Campus</h3>
</div>

<div class="card" onclick="filterAsian()">
<h3>Asian</h3>
</div>

<div class="card" onclick="filterRedtape()">
<h3>RedTape</h3>
</div>

</section>

<section id="products" class="products"></section>

<section id="productView"></section>

<script src="script.js"></script>

</body>
</html>
