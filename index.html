<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SneakerX Eid Store</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🌙 EID BANNER -->
<div class="eid-banner">
🌙 Eid Mubarak ✨ Special Sale Up To 50% OFF
</div>

<header>
<div class="logo">SneakerX</div>
<nav>
<a onclick="showHome()">Home</a>
<a onclick="showStore()">Store</a>
<a onclick="filterNike()">Hype</a>
</nav>
</header>

<!-- 🔍 SEARCH -->
<section class="top-bar">
<input type="text" placeholder="Search sneakers..." oninput="searchProduct(this.value)">
</section>

<!-- 🎞️ SLIDER -->
<section class="slider">
<img id="slideImg">
</section>

<!-- 🎯 FILTER -->
<section class="filters">
<select onchange="filterBrand(this.value)">
<option value="all">All</option>
<option value="Nike">Nike</option>
<option value="RedTape">RedTape</option>
<option value="Campus">Campus</option>
<option value="Asian">Asian</option>
</select>

<select onchange="filterPrice(this.value)">
<option value="all">Price</option>
<option value="1000">Under ₹1000</option>
<option value="2000">Under ₹2000</option>
</select>
</section>

<section id="products" class="products"></section>
<section id="productView"></section>
<section id="orderBox"></section>

<!-- ✨ STARS -->
<div class="stars" id="stars"></div>

<script src="script.js"></script>
</body>
</html>
