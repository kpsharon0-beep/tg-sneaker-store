<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SneakerX Luxury</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🌙 EID BAR -->
<div class="eid-banner">🌙 Eid Mubarak • Up to 50% OFF</div>

<header>
<div class="logo">SneakerX</div>
<nav>
<a onclick="goHome()">Home</a>
<a onclick="showStore()">Shop</a>
<a onclick="filterNike()">Hype</a>
</nav>
</header>

<!-- 👑 HERO -->
<section class="hero">
<h1>Luxury Sneakers</h1>
<p>Minimal • Premium • Exclusive</p>
<button onclick="showStore()">Explore Collection</button>
</section>

<!-- 🔥 FEATURED -->
<section class="featured">
<h2>🔥 Hype Drop</h2>

<div class="featured-box" onclick="viewProduct('Nike Dunk Hayley Wilson',1999,'hayley.jpg')">
<img src="hayley.jpg">
<h3>Hayley Wilson Dunk</h3>
<p>₹1999</p>
</div>

</section>

<!-- 🔍 SEARCH -->
<section class="top-bar">
<input type="text" placeholder="Search..." oninput="searchProduct(this.value)">
</section>

<!-- 🎯 FILTER -->
<section class="filters">
<select onchange="filterBrand(this.value)">
<option value="all">All</option>
<option value="Nike">Nike</option>
<option value="RedTape">RedTape</option>
<option value="Campus">Campus</option>
<option value="Asian">Asian</option>
</select>

<select onchange="filterPrice(this.value)">
<option value="all">Price</option>
<option value="1000">Under ₹1000</option>
<option value="2000">Under ₹2000</option>
</select>
</section>

<section id="products" class="products"></section>
<section id="productView"></section>

<script src="script.js"></script>
</body>
</html>
